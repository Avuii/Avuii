<svg xmlns="http://www.w3.org/2000/svg" width="226" height="58" viewBox="0 0 226 58" fill="none" role="img" aria-label="Discord badge">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="226" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#818CF8"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-40 0; 40 0; -40 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="226" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#17132B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label {
        font: 700 22px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
        letter-spacing: .2px;
      }
      .subtle {
        opacity: .5;
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .42; }
        50% { opacity: .85; }
      }
    </style>
  </defs>

  <rect x="5" y="5" width="216" height="48" rx="24" fill="url(#inner)" stroke="url(#border)" stroke-width="1.7" filter="url(#glow)"/>
  <rect x="13" y="13" width="32" height="32" rx="12" fill="#0B1020" stroke="url(#border)" stroke-width="1.2" opacity=".95"/>
  <g transform="translate(21 21)" stroke="url(#border)" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.2 5.2c1.6-1.1 3.1-1.4 4.8-1.4s3.2.3 4.8 1.4l1 7.2c-1.2.9-2.3 1.3-3.5 1.5l-.7-1.2c-1 .2-2.2.2-3.2 0l-.7 1.2c-1.2-.2-2.3-.6-3.5-1.5l1-7.2z"/><circle cx="6.2" cy="8.5" r=".7" fill="#E879F9" stroke="none"/><circle cx="9.8" cy="8.5" r=".7" fill="#60A5FA" stroke="none"/>
  </g>
  <circle class="subtle" cx="199" cy="29" r="4" fill="#818CF8"/>
  <text class="label" x="60" y="37">Discord</text>
</svg>
