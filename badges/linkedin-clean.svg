<svg xmlns="http://www.w3.org/2000/svg" width="246" height="58" viewBox="0 0 246 58" fill="none" role="img" aria-label="LinkedIn badge">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="246" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#60A5FA"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-40 0; 40 0; -40 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="246" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#17132B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label {
        font: 700 22px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
        letter-spacing: .2px;
      }
      .subtle {
        opacity: .5;
        animation: pulse 4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .42; }
        50% { opacity: .85; }
      }
    </style>
  </defs>

  <rect x="5" y="5" width="236" height="48" rx="24" fill="url(#inner)" stroke="url(#border)" stroke-width="1.7" filter="url(#glow)"/>
  <rect x="13" y="13" width="32" height="32" rx="12" fill="#0B1020" stroke="url(#border)" stroke-width="1.2" opacity=".95"/>
  <g transform="translate(21 21)" stroke="url(#border)" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="16" height="16" rx="3"/><path d="M4.2 6.8v5.2"/><path d="M4.2 4.2h.01"/><path d="M8 12V7.2"/><path d="M8 9.2c0-1.2.8-2.2 2-2.2s2 1 2 2.2V12"/>
  </g>
  <circle class="subtle" cx="219" cy="29" r="4" fill="#60A5FA"/>
  <text class="label" x="60" y="37">LinkedIn</text>
</svg>
