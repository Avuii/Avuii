<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="Linux">
  <defs>
    <linearGradient id="badge-border-linux" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FACC15" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-linux" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-linux" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-linux {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-linux)" stroke="url(#badge-border-linux)" stroke-width="1.25" filter="url(#soft-glow-linux)"/>
  <g transform="translate(12 9)">
    
<ellipse cx="12" cy="13" rx="6.2" ry="8.2" fill="#F8FAFC"/>
<circle cx="12" cy="7" r="4.1" fill="#111827"/>
<circle cx="10.6" cy="6.8" r=".7" fill="#FFFFFF"/>
<circle cx="13.4" cy="6.8" r=".7" fill="#FFFFFF"/>
<path d="M10.4 8.4 12 9.5l1.6-1.1" fill="#FACC15"/>
<ellipse cx="7.1" cy="19.2" rx="3" ry="1.5" fill="#FACC15" transform="rotate(-20 7.1 19.2)"/>
<ellipse cx="16.9" cy="19.2" rx="3" ry="1.5" fill="#FACC15" transform="rotate(20 16.9 19.2)"/>
  </g>
  <text class="skill-label-linux" x="47" y="26">Linux</text>
</svg>
