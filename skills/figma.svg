<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="Figma">
  <defs>
    <linearGradient id="badge-border-figma" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F24E1E" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-figma" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-figma" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-figma {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-figma)" stroke="url(#badge-border-figma)" stroke-width="1.25" filter="url(#soft-glow-figma)"/>
  <g transform="translate(12 9)">
    
<circle cx="9" cy="6" r="3.4" fill="#F24E1E"/>
<circle cx="15" cy="6" r="3.4" fill="#FF7262"/>
<circle cx="9" cy="12" r="3.4" fill="#A259FF"/>
<circle cx="15" cy="12" r="3.4" fill="#1ABCFE"/>
<circle cx="9" cy="18" r="3.4" fill="#0ACF83"/>
  </g>
  <text class="skill-label-figma" x="47" y="26">Figma</text>
</svg>
