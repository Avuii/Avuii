<svg xmlns="http://www.w3.org/2000/svg" width="130" height="42" viewBox="0 0 130 42" fill="none" role="img" aria-label="Node.js">
  <defs>
    <linearGradient id="badge-border-nodejs" x1="0" y1="0" x2="130" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#339933" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-nodejs" x1="0" y1="0" x2="130" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-nodejs" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-nodejs {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="125" height="36" rx="18" fill="url(#badge-bg-nodejs)" stroke="url(#badge-border-nodejs)" stroke-width="1.25" filter="url(#soft-glow-nodejs)"/>
  <g transform="translate(12 9)">
    
<polygon points="12,2.5 20.2,7.2 20.2,16.8 12,21.5 3.8,16.8 3.8,7.2" fill="#339933"/>
<text x="12" y="15.2" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="900" font-size="8.2" fill="#0D1117">JS</text>
  </g>
  <text class="skill-label-nodejs" x="47" y="26">Node.js</text>
</svg>
