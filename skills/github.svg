<svg xmlns="http://www.w3.org/2000/svg" width="122" height="42" viewBox="0 0 122 42" fill="none" role="img" aria-label="GitHub">
  <defs>
    <linearGradient id="badge-border-github" x1="0" y1="0" x2="122" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-github" x1="0" y1="0" x2="122" y2="42" gradientUnits="userSpaceOnUse">
