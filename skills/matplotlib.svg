<svg xmlns="http://www.w3.org/2000/svg" width="156" height="42" viewBox="0 0 156 42" fill="none" role="img" aria-label="Matplotlib">
  <defs>
    <linearGradient id="badge-border-matplotlib" x1="0" y1="0" x2="156" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-matplotlib" x1="0" y1="0" x2="156" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-matplotlib" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-matplotlib {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="151" height="36" rx="18" fill="url(#badge-bg-matplotlib)" stroke="url(#badge-border-matplotlib)" stroke-width="1.25" filter="url(#soft-glow-matplotlib)"/>
  <g transform="translate(12 9)">
    
<circle cx="12" cy="12" r="9" fill="#F8FAFC"/>
<path d="M12 12 L12 3 A9 9 0 0 1 20.5 9z" fill="#4E79A7"/>
<path d="M12 12 L20.5 9 A9 9 0 0 1 17 20z" fill="#F28E2B"/>
<path d="M12 12 L17 20 A9 9 0 0 1 5 18z" fill="#59A14F"/>
<path d="M12 12 L5 18 A9 9 0 0 1 12 3z" fill="#E15759"/>
<circle cx="12" cy="12" r="3.5" fill="#0D1117"/>
  </g>
  <text class="skill-label-matplotlib" x="47" y="26">Matplotlib</text>
</svg>
