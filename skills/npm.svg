<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="npm">
  <defs>
    <linearGradient id="badge-border-npm" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CB3837" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#E879F9" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-npm" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-npm" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-npm {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-npm)" stroke="url(#badge-border-npm)" stroke-width="1.25" filter="url(#soft-glow-npm)"/>
  <g transform="translate(12 9)">
    
<rect x="2.7" y="6" width="18.6" height="12.2" rx="1.2" fill="#CB3837"/>
<text x="12" y="15.4" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="7.2" fill="#FFFFFF">npm</text>
  </g>
  <text class="skill-label-npm" x="47" y="26">npm</text>
</svg>
