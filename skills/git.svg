<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="Git">
  <defs>
    <linearGradient id="badge-border-git" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F05032" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#E879F9" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-git" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-git" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-git {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-git)" stroke="url(#badge-border-git)" stroke-width="1.25" filter="url(#soft-glow-git)"/>
  <g transform="translate(12 9)">
    
<rect x="4.3" y="4.3" width="15.4" height="15.4" rx="2.2" transform="rotate(45 12 12)" fill="#F05032"/>
<path d="M9 8.4l6.7 6.7M10.3 9.7v4.8M15.7 15.1v-3" stroke="#0D1117" stroke-width="1.7" stroke-linecap="round"/>
<circle cx="9" cy="8.4" r="1.6" fill="#0D1117"/>
<circle cx="10.3" cy="14.5" r="1.6" fill="#0D1117"/>
<circle cx="15.7" cy="15.1" r="1.6" fill="#0D1117"/>
  </g>
  <text class="skill-label-git" x="47" y="26">Git</text>
