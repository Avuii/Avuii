      <stop offset="0%" stop-color="#F8FAFC" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity=".72"/>
