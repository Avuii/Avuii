<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="C#">
  <defs>
    <linearGradient id="badge-border-csharp" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-csharp" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-csharp" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-csharp {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-csharp)" stroke="url(#badge-border-csharp)" stroke-width="1.25" filter="url(#soft-glow-csharp)"/>
  <g transform="translate(12 9)">
    
<polygon points="12,2 21,7 21,17 12,22 3,17 3,7" fill="#68217A"/>
<polygon points="12,4.2 18.8,8 18.8,16 12,19.8 5.2,16 5.2,8" fill="#9B4FBD" opacity=".85"/>
<text x="12" y="15.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="8.2" fill="#FFFFFF">C#</text>
  </g>
  <text class="skill-label-csharp" x="47" y="26">C#</text>
</svg>
