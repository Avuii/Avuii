<svg xmlns="http://www.w3.org/2000/svg" width="117" height="40" viewBox="0 0 117 40" fill="none" role="img" aria-label="LaTeX">
  <defs>
    <linearGradient id="border-latex" x1="0" y1="0" x2="117" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#60A5FA"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-24 0; 24 0; -24 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inner-latex" x1="0" y1="0" x2="117" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#151225"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow-latex" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label-latex {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
        letter-spacing: .1px;
      }
      .mark-latex {
        font: 800 11px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
      }
      .dot-latex {
        animation: pulse-latex 4s ease-in-out infinite;
      }
      @keyframes pulse-latex {
        0%, 100% { opacity: .38; }
        50% { opacity: .9; }
      }
    </style>
  </defs>
  <rect x="2.5" y="3" width="112" height="34" rx="17" fill="url(#inner-latex)" stroke="url(#border-latex)" stroke-width="1.35" filter="url(#glow-latex)"/>
  <rect x="10" y="9" width="22" height="22" rx="8" fill="#0B1020" stroke="url(#border-latex)" stroke-width="1"/>
  <text class="mark-latex" x="21" y="24" text-anchor="middle">TeX</text>
  <text class="label-latex" x="42" y="25">LaTeX</text>
  <circle class="dot-latex" cx="100" cy="20" r="3.2" fill="#60A5FA"/>
</svg>
