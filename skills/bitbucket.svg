<svg xmlns="http://www.w3.org/2000/svg" width="153" height="40" viewBox="0 0 153 40" fill="none" role="img" aria-label="Bitbucket">
  <defs>
    <linearGradient id="border-bitbucket" x1="0" y1="0" x2="153" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#60A5FA"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-24 0; 24 0; -24 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inner-bitbucket" x1="0" y1="0" x2="153" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#151225"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow-bitbucket" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label-bitbucket {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
        letter-spacing: .1px;
      }
      .mark-bitbucket {
        font: 800 11px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
      }
      .dot-bitbucket {
        animation: pulse-bitbucket 4s ease-in-out infinite;
      }
      @keyframes pulse-bitbucket {
        0%, 100% { opacity: .38; }
        50% { opacity: .9; }
      }
    </style>
  </defs>
  <rect x="2.5" y="3" width="148" height="34" rx="17" fill="url(#inner-bitbucket)" stroke="url(#border-bitbucket)" stroke-width="1.35" filter="url(#glow-bitbucket)"/>
  <rect x="10" y="9" width="22" height="22" rx="8" fill="#0B1020" stroke="url(#border-bitbucket)" stroke-width="1"/>
  <text class="mark-bitbucket" x="21" y="24" text-anchor="middle">BB</text>
  <text class="label-bitbucket" x="42" y="25">Bitbucket</text>
  <circle class="dot-bitbucket" cx="136" cy="20" r="3.2" fill="#60A5FA"/>
</svg>
