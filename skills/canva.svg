<svg xmlns="http://www.w3.org/2000/svg" width="117" height="40" viewBox="0 0 117 40" fill="none" role="img" aria-label="Canva">
  <defs>
    <linearGradient id="border-canva" x1="0" y1="0" x2="117" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-24 0; 24 0; -24 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="inner-canva" x1="0" y1="0" x2="117" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#151225"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow-canva" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label-canva {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
        letter-spacing: .1px;
      }
      .mark-canva {
        font: 800 11px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #F8FAFC;
      }
      .dot-canva {
        animation: pulse-canva 4s ease-in-out infinite;
      }
      @keyframes pulse-canva {
        0%, 100% { opacity: .38; }
        50% { opacity: .9; }
      }
    </style>
  </defs>
  <rect x="2.5" y="3" width="112" height="34" rx="17" fill="url(#inner-canva)" stroke="url(#border-canva)" stroke-width="1.35" filter="url(#glow-canva)"/>
  <rect x="10" y="9" width="22" height="22" rx="8" fill="#0B1020" stroke="url(#border-canva)" stroke-width="1"/>
  <text class="mark-canva" x="21" y="24" text-anchor="middle">Cv</text>
  <text class="label-canva" x="42" y="25">Canva</text>
  <circle class="dot-canva" cx="100" cy="20" r="3.2" fill="#A78BFA"/>
</svg>
