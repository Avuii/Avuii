<svg xmlns="http://www.w3.org/2000/svg" width="118" height="42" viewBox="0 0 118 42" fill="none" role="img" aria-label="Canva">
  <defs>
    <linearGradient id="badge-border-canva" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC" stop-opacity=".72"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity=".48"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity=".72"/>
    </linearGradient>
    <linearGradient id="badge-bg-canva" x1="0" y1="0" x2="118" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#121826"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="canvaIconGrad" x1="2" y1="3" x2="22" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C4CC"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft-glow-canva" x="-12%" y="-35%" width="124%" height="170%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .skill-label-canva {
        font: 700 14px 'Segoe UI', Inter, Arial, sans-serif;
        fill: #CBD5E1;
        letter-spacing: .05px;
      }
    </style>
  </defs>

  <rect x="2.5" y="3" width="113" height="36" rx="18" fill="url(#badge-bg-canva)" stroke="url(#badge-border-canva)" stroke-width="1.25" filter="url(#soft-glow-canva)"/>
  <g transform="translate(12 9)">
    
<circle cx="12" cy="12" r="10" fill="#00C4CC"/>
<circle cx="12" cy="12" r="10" fill="url(#canvaIconGrad)" opacity=".9"/>
<text x="12" y="16" text-anchor="middle" font-family="Georgia, serif" font-weight="800" font-size="13" fill="#FFFFFF">C</text>
  </g>
  <text class="skill-label-canva" x="47" y="26">Canva</text>
</svg>
