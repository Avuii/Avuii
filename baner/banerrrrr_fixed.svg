<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1600 480" fill="none" role="img" aria-label="Animated transparent tech banner for Katarzyna Stańczyk">
  <defs>
    <linearGradient id="nameGrad" x1="120" y1="90" x2="840" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1E1B8A"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1600" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="accent2" x1="980" y1="70" x2="1450" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="codeGrad" x1="1040" y1="110" x2="1335" y2="335" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>

    <linearGradient id="tileGrad" x1="1010" y1="140" x2="1110" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="mugGrad" x1="1415" y1="320" x2="1495" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .name { font: 700 72px 'Segoe UI', Inter, Arial, sans-serif; fill: url(#nameGrad); letter-spacing: -1px; }
      .sub  { font: 500 34px 'Segoe UI', Inter, Arial, sans-serif; fill: #4F46E5; }
      .small{ font: 400 25px 'Segoe UI', Inter, Arial, sans-serif; fill: #334155; }
      .meta { font: 500 24px 'Segoe UI', Inter, Arial, sans-serif; fill: #4F46E5; }
      .muted{ fill: #374151; }
      .bullet{ fill: #E879F9; }
      .spark { animation: twinkle 3.6s ease-in-out infinite; transform-origin: center; }
      .spark2 { animation: twinkle 4.2s ease-in-out infinite 0.8s; transform-origin: center; }
      .floatSlow { animation: floatSlow 6.5s ease-in-out infinite; transform-origin: center; }
      .floatMed { animation: floatMed 4.7s ease-in-out infinite; transform-origin: center; }
      .floatLaptop { animation: floatLaptop 5.8s ease-in-out infinite; transform-origin: 1220px 255px; }
      .pulseDot { animation: pulseDot 3.2s ease-in-out infinite; }
      .pulseDot2 { animation: pulseDot 4.4s ease-in-out infinite 1.1s; }
      .ground { animation: groundMove 6s linear infinite; }
      .codeLine1 { animation: flicker1 3.5s ease-in-out infinite; }
      .codeLine2 { animation: flicker2 4.1s ease-in-out infinite; }
      .dinoMove { animation: dinoMove 7s linear infinite; }
      .legA { animation: legA .45s steps(1) infinite; }
      .legB { animation: legB .45s steps(1) infinite; }
      .network { animation: netFloat 7.5s ease-in-out infinite; transform-origin: 1460px 120px; }
      .codeTile { animation: tileFloat 4.8s ease-in-out infinite; transform-origin: 1060px 180px; }

      @keyframes twinkle {
        0%,100% { opacity:.25; transform: scale(1); }
        50% { opacity:1; transform: scale(1.35); }
      }
      @keyframes floatSlow {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes floatMed {
        0%,100% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-8px) translateX(6px); }
      }
      @keyframes floatLaptop {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-7px); }
      }
      @keyframes pulseDot {
        0%,100% { opacity:.3; }
        50% { opacity:1; }
      }
      @keyframes groundMove {
        from { transform: translateX(0); }
        to   { transform: translateX(-120px); }
      }
      @keyframes flicker1 {
        0%,100% { opacity:.65; }
        50% { opacity:1; }
      }
      @keyframes flicker2 {
        0%,100% { opacity:.55; }
        35% { opacity:.95; }
        70% { opacity:.72; }
      }
      @keyframes dinoMove {
        0%   { transform: translateX(0px); }
        45%  { transform: translateX(310px); }
        50%  { transform: translateX(310px); }
        95%  { transform: translateX(0px); }
        100% { transform: translateX(0px); }
      }
      @keyframes legA {
        0%,49% { opacity:1; }
        50%,100% { opacity:0; }
      }
      @keyframes legB {
        0%,49% { opacity:0; }
        50%,100% { opacity:1; }
      }
      @keyframes netFloat {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-8px) translateX(4px); }
      }
      @keyframes tileFloat {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }
    </style>
  </defs>

  <!-- decorative sparkles -->
  <g class="spark" opacity="0.75">
    <path d="M72 88 L82 98 L72 108 L62 98 Z" fill="#E879F9"/>
  </g>
  <g class="spark2" opacity="0.68">
    <circle cx="116" cy="138" r="4" fill="#60A5FA"/>
  </g>
  <g class="spark" opacity="0.72">
    <circle cx="930" cy="118" r="4.2" fill="#E879F9"/>
  </g>
  <g class="spark2" opacity="0.72">
    <circle cx="935" cy="405" r="3.8" fill="#60A5FA"/>
  </g>
  <g class="spark" opacity="0.72">
    <circle cx="78" cy="365" r="3" fill="#C084FC"/>
  </g>
  <g class="spark2" opacity="0.72">
    <circle cx="962" cy="165" r="3.5" fill="#60A5FA"/>
  </g>

  <!-- left text block -->
  <text x="120" y="210" class="name">Katarzyna Stańczyk</text>

  <text x="120" y="288" class="sub">
    <tspan>.NET Developer</tspan>
    <tspan class="bullet" dx="34">•</tspan>
    <tspan class="muted" dx="34">Computer Science Student</tspan>
  </text>

  <text x="120" y="350" class="small">
    <tspan>Business applications</tspan>
    <tspan class="bullet" dx="28">•</tspan>
    <tspan dx="28">UI design</tspan>
    <tspan class="bullet" dx="28">•</tspan>
    <tspan dx="28">Real-world solutions</tspan>
  </text>

  <text x="120" y="415" class="meta">
    <tspan>Poland</tspan>
    <tspan class="bullet" dx="26">•</tspan>
    <tspan class="muted" dx="26">University of Łódź</tspan>
  </text>

  <!-- right side 3D-ish laptop illustration -->
  <g class="floatLaptop">
    <!-- code tile -->
    <g class="codeTile" filter="url(#glow)">
      <rect x="990" y="150" width="92" height="72" rx="17" fill="url(#tileGrad)" opacity="0.95"/>
      <path d="M1035 172 L1015 186 L1035 200" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M1046 172 L1066 186 L1046 200" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- laptop base -->
    <g filter="url(#softGlow)">
      <path d="M1010 300 L1168 232 L1348 288 L1208 368 Z" fill="url(#accent2)" opacity="0.88"/>
      <path d="M1010 300 L1208 368 L1348 288" stroke="#F0ABFC" stroke-opacity="0.5" stroke-width="2.4"/>
    </g>

    <!-- screen -->
    <g filter="url(#glow)">
      <rect x="1090" y="90" width="245" height="188" rx="20" fill="url(#codeGrad)" stroke="#C4B5FD" stroke-opacity="0.85" stroke-width="3"/>
      <rect x="1103" y="103" width="219" height="162" rx="13" fill="#1E1B4B"/>
      <circle cx="1117" cy="112" r="2.5" fill="#F0ABFC" class="pulseDot"/>
      <circle cx="1128" cy="112" r="2.5" fill="#93C5FD" class="pulseDot2"/>
      <circle cx="1139" cy="112" r="2.5" fill="#E879F9" class="pulseDot"/>

      <!-- code lines -->
      <rect x="1130" y="132" width="52" height="5" rx="2.5" fill="#818CF8" class="codeLine1"/>
      <rect x="1192" y="132" width="66" height="5" rx="2.5" fill="#E879F9" class="codeLine2"/>
      <rect x="1265" y="132" width="24" height="5" rx="2.5" fill="#60A5FA" class="codeLine1"/>

      <rect x="1148" y="154" width="84" height="6" rx="3" fill="#E879F9" class="codeLine2"/>
      <rect x="1240" y="154" width="31" height="6" rx="3" fill="#A78BFA" class="codeLine1"/>

      <rect x="1140" y="176" width="41" height="5" rx="2.5" fill="#60A5FA" class="codeLine1"/>
      <rect x="1188" y="176" width="93" height="5" rx="2.5" fill="#C084FC" class="codeLine2"/>
      <rect x="1288" y="176" width="21" height="5" rx="2.5" fill="#93C5FD" class="codeLine1"/>

      <rect x="1148" y="198" width="73" height="6" rx="3" fill="#C084FC" class="codeLine1"/>
      <rect x="1228" y="198" width="64" height="6" rx="3" fill="#60A5FA" class="codeLine2"/>

      <rect x="1140" y="220" width="56" height="5" rx="2.5" fill="#E879F9" class="codeLine2"/>
      <rect x="1204" y="220" width="82" height="5" rx="2.5" fill="#A78BFA" class="codeLine1"/>

      <rect x="1148" y="243" width="102" height="6" rx="3" fill="#60A5FA" class="codeLine1"/>
      <rect x="1258" y="243" width="40" height="6" rx="3" fill="#E879F9" class="codeLine2"/>
    </g>

    <!-- cleaner keyboard / trackpad -->
    <g opacity="0.78">
      <rect x="1048" y="294" width="188" height="72" rx="14" fill="#1E1B4B" opacity="0.42"/>
      <g fill="#F8FAFC" opacity="0.58">
        <rect x="1065" y="306" width="13" height="7" rx="2"/>
        <rect x="1084" y="306" width="13" height="7" rx="2"/>
        <rect x="1103" y="306" width="13" height="7" rx="2"/>
        <rect x="1122" y="306" width="13" height="7" rx="2"/>
        <rect x="1141" y="306" width="13" height="7" rx="2"/>
        <rect x="1160" y="306" width="13" height="7" rx="2"/>
        <rect x="1179" y="306" width="13" height="7" rx="2"/>
        <rect x="1198" y="306" width="13" height="7" rx="2"/>

        <rect x="1074" y="320" width="13" height="7" rx="2"/>
        <rect x="1093" y="320" width="13" height="7" rx="2"/>
        <rect x="1112" y="320" width="13" height="7" rx="2"/>
        <rect x="1131" y="320" width="13" height="7" rx="2"/>
        <rect x="1150" y="320" width="13" height="7" rx="2"/>
        <rect x="1169" y="320" width="13" height="7" rx="2"/>
        <rect x="1188" y="320" width="13" height="7" rx="2"/>
      </g>
      <rect x="1095" y="340" width="86" height="22" rx="7" fill="#CBD5E1" opacity="0.22" stroke="#C4B5FD" stroke-opacity="0.28"/>
    </g>

    <!-- mug -->
    <g class="floatMed" filter="url(#glow)">
      <rect x="1415" y="342" width="68" height="78" rx="18" fill="url(#mugGrad)" opacity="0.96"/>
      <ellipse cx="1449" cy="343" rx="30" ry="7" fill="#312E81"/>
      <ellipse cx="1449" cy="343" rx="23" ry="4.5" fill="#1E1B4B" opacity="0.85"/>
      <path d="M1482 358 q23 4 23 25 q0 20 -23 24" stroke="#C4B5FD" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M1438 326 q-8 -12 3 -23" stroke="#C4B5FD" stroke-width="3.2" stroke-linecap="round" opacity="0.68"/>
      <path d="M1455 326 q-8 -12 3 -23" stroke="#E879F9" stroke-width="3.2" stroke-linecap="round" opacity="0.58"/>
      <circle cx="1449" cy="384" r="4.8" fill="#F8FAFC" opacity="0.72"/>
    </g>

    <!-- little bottom tile -->
    <g class="floatSlow" filter="url(#glow)">
      <rect x="1328" y="404" width="70" height="44" rx="12" fill="url(#tileGrad)"/>
      <path d="M1352 418 L1341 426 L1352 434" stroke="white" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M1374 418 L1385 426 L1374 434" stroke="white" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- network graph -->
  <g class="network" filter="url(#glow)" opacity="0.72">
    <path d="M1450 106 L1490 136 L1546 142 L1514 190 L1455 186 L1428 152 Z" stroke="url(#accent)" stroke-width="2.2" opacity="0.6"/>
    <path d="M1490 136 L1514 190" stroke="url(#accent)" stroke-width="2.2" opacity="0.55"/>
    <circle cx="1450" cy="106" r="7" fill="#E879F9" class="pulseDot"/>
    <circle cx="1490" cy="136" r="9" fill="#C084FC" class="pulseDot2"/>
    <circle cx="1546" cy="142" r="10" fill="#A78BFA" class="pulseDot"/>
    <circle cx="1514" cy="190" r="8" fill="#60A5FA" class="pulseDot2"/>
    <circle cx="1455" cy="186" r="9" fill="#93C5FD" class="pulseDot"/>
    <circle cx="1428" cy="152" r="8" fill="#E879F9" class="pulseDot2"/>
    <circle cx="1570" cy="257" r="6" fill="#A78BFA" class="spark"/>
  </g>
</svg>
